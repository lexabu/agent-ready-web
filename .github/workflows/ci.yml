name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build nextjs example (prereq for e2e)
        run: pnpm --filter @agent-ready-web/example-nextjs run build

      - name: Unit tests (all workspaces)
        run: pnpm run test

      - name: Pack + install smoke
        run: ./scripts/pack-smoke.sh
